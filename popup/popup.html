<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>DOM-inator (DOM 终结者)</h2>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee;">
      <div class="domain-info" style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">
        当前域名: <strong id="currentDomain">获取中...</strong>
      </div>
      <label class="switch" style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
        <span id="globalToggleText">已开启</span>
        <input type="checkbox" id="globalToggle" checked style="accent-color: #1a73e8; cursor: pointer;">
      </label>
    </div>
    
    <div class="input-group" style="flex-direction: column; gap: 8px; margin-bottom: 16px;">
      <select id="ruleType" style="padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px;">
        <option value="text">通过 包含特定文本 屏蔽</option>
        <option value="selector">通过 CSS选择器 屏蔽</option>
        <option value="image">通过 包含特定图片 屏蔽</option>
      </select>
      
      <div id="unifiedInputGroup" style="display: flex; flex-direction: column; gap: 8px;">
        <div style="display: flex; gap: 8px;">
          <input type="text" id="keywordInput" placeholder="输入要屏蔽的文本内容 (如 张三)" style="flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;">
          <button id="pickContentBtn" title="在页面上提取特征" style="padding: 6px 10px; background-color: #f1f3f4; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; white-space: nowrap;">🎯 提取</button>
        </div>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="containerInput" placeholder="要隐藏的父容器(如 .comment-item，不填默认自身)" style="flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;">
          <button id="pickContainerBtn" title="在页面上选择父容器 CSS选择器" style="padding: 6px 10px; background-color: #f1f3f4; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; white-space: nowrap;">🎯 选择</button>
        </div>
      </div>

      <button id="addRuleBtn" style="width: 100%; padding: 8px; margin-top: 4px;">添加屏蔽</button>
    </div>

    <div class="rules-section">
      <h3>当前域名的屏蔽规则：</h3>
      <ul id="rulesList"></ul>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
